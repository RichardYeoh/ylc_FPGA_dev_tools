<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>贪吃蛇</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef3f7;
      --surface: #ffffff;
      --surface-soft: #f7fafc;
      --ink: #182235;
      --muted: #667389;
      --line: #dce5ee;
      --grid: #e5edf4;
      --snake: #1d9a72;
      --snake-head: #0f6b50;
      --food: #e84c4f;
      --gold: #e7a316;
      --slow: #2878d8;
      --double: #8a57d6;
      --phase: #0d9aa6;
      --accent: #2867d4;
      --accent-strong: #164d9f;
      --danger: #cf3f45;
      --shadow: 0 18px 50px rgba(24, 34, 53, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(145deg, rgba(40, 103, 212, 0.14), transparent 38%),
        linear-gradient(315deg, rgba(29, 154, 114, 0.12), transparent 36%),
        radial-gradient(circle at 72% 18%, rgba(232, 76, 79, 0.10), transparent 26%),
        var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(360px, 650px) minmax(300px, 390px);
      align-items: center;
      gap: 30px;
      padding: 30px 0;
    }

    .game-shell,
    .side-panel {
      display: grid;
      gap: 18px;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 5vw, 60px);
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .mode-chip {
      display: inline-flex;
      align-items: center;
      height: 34px;
      padding: 0 12px;
      border: 1px solid rgba(24, 34, 53, 0.10);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--muted);
      font-size: 13px;
      font-weight: 680;
      white-space: nowrap;
    }

    .board-wrap {
      position: relative;
      width: min(100%, 650px);
      aspect-ratio: 1;
      padding: 16px;
      border: 1px solid rgba(24, 34, 53, 0.10);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(247, 250, 252, 0.86));
      box-shadow: var(--shadow);
    }

    .board-wrap::before {
      content: "";
      position: absolute;
      inset: 9px;
      border: 1px solid rgba(40, 103, 212, 0.12);
      border-radius: 8px;
      pointer-events: none;
    }

    canvas {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 7px;
      background: #fcfdff;
      outline: none;
    }

    canvas:focus {
      box-shadow: 0 0 0 3px rgba(40, 103, 212, 0.18);
    }

    .overlay {
      position: absolute;
      z-index: 2;
      inset: 16px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      background: rgba(238, 243, 247, 0.70);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
    }

    .overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-panel {
      width: min(78%, 330px);
      padding: 22px;
      border: 1px solid rgba(24, 34, 53, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 16px 44px rgba(24, 34, 53, 0.15);
      text-align: center;
    }

    .overlay-title {
      margin: 0;
      font-size: 25px;
      font-weight: 800;
    }

    .overlay-text {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .score-form {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .score-form[hidden] {
      display: none;
    }

    .score-form label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 680;
      text-align: left;
    }

    .score-form input {
      width: 100%;
      height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      outline: none;
    }

    .score-form input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(40, 103, 212, 0.14);
    }

    .score-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat,
    .panel-block {
      border: 1px solid rgba(24, 34, 53, 0.10);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 10px 28px rgba(24, 34, 53, 0.07);
    }

    .stat {
      min-height: 84px;
      padding: 15px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 680;
    }

    .stat-value {
      margin-top: 8px;
      font-size: 29px;
      line-height: 1;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      height: 46px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 720;
      transition: background 140ms ease, transform 140ms ease, box-shadow 140ms ease;
    }

    button:hover {
      background: var(--accent-strong);
      box-shadow: 0 8px 18px rgba(40, 103, 212, 0.22);
    }

    button:active {
      transform: translateY(1px);
    }

    button.secondary {
      background: #e8eef5;
      color: var(--ink);
    }

    button.secondary:hover {
      background: #dbe5ef;
      box-shadow: none;
    }

    .status {
      min-height: 64px;
      padding: 16px;
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--muted);
      line-height: 1.45;
    }

    .panel-block {
      padding: 16px;
    }

    .panel-title {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 800;
    }

    .effect-list {
      display: grid;
      gap: 8px;
    }

    .effect-row,
    .legend-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 34px;
      color: var(--muted);
      font-size: 13px;
    }

    .effect-name,
    .legend-name {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .icon {
      width: 22px;
      height: 22px;
      flex: 0 0 22px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      font-size: 10px;
      font-weight: 850;
      box-shadow:
        inset 0 2px 2px rgba(255, 255, 255, 0.58),
        inset 0 -4px 8px rgba(24, 34, 53, 0.22),
        0 5px 10px rgba(24, 34, 53, 0.18);
    }

    .icon.gold {
      background: radial-gradient(circle at 32% 28%, #fff4b9 0 16%, #ffd15c 17% 34%, var(--gold) 35% 74%, #9d6509 100%);
    }

    .icon.slow {
      background: radial-gradient(circle at 32% 28%, #cbe5ff 0 18%, #6bb3ff 19% 40%, var(--slow) 41% 76%, #124171 100%);
    }

    .icon.double {
      background: radial-gradient(circle at 32% 28%, #eadcff 0 18%, #b58af7 19% 40%, var(--double) 41% 76%, #4e2984 100%);
    }

    .icon.phase {
      background: radial-gradient(circle at 32% 28%, #c7f8fb 0 18%, #59d5dd 19% 40%, var(--phase) 41% 76%, #075960 100%);
    }

    .effect-time {
      color: var(--ink);
      font-weight: 760;
      font-variant-numeric: tabular-nums;
    }

    .legend {
      display: grid;
      gap: 6px;
    }

    .legend-row {
      justify-content: flex-start;
    }

    .leaderboard {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .leaderboard li {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      min-height: 32px;
      color: var(--muted);
      font-size: 13px;
    }

    .rank {
      width: 26px;
      height: 26px;
      display: inline-grid;
      place-items: center;
      border-radius: 8px;
      background: #edf3f9;
      color: var(--ink);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .player {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rank-score {
      color: var(--ink);
      font-weight: 820;
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 940px) {
      main {
        grid-template-columns: 1fr;
        align-items: start;
        padding-top: 22px;
      }
    }

    @media (max-width: 620px) {
      main {
        width: min(100vw - 20px, 440px);
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .score-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .board-wrap {
        padding: 10px;
      }

      .overlay {
        inset: 10px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="game-shell" aria-label="贪吃蛇游戏区域">
      <div class="topbar">
        <div>
          <h1>贪吃蛇</h1>
          <p class="subtitle">24x24 · 有墙 · 自动加速 · 随机道具</p>
        </div>
        <div class="mode-chip">经典增强版</div>
      </div>
      <div class="board-wrap">
        <canvas id="board" tabindex="0" aria-label="贪吃蛇游戏画布"></canvas>
        <div id="overlay" class="overlay" aria-live="polite">
          <div class="overlay-panel">
            <p id="overlayTitle" class="overlay-title">暂停</p>
            <p id="overlayText" class="overlay-text">按继续返回游戏</p>
            <form id="scoreForm" class="score-form" hidden>
              <label for="playerName">用户名</label>
              <input id="playerName" name="playerName" maxlength="16" autocomplete="nickname" placeholder="输入用户名上榜">
              <button id="saveScoreBtn" type="submit">保存排名</button>
            </form>
          </div>
        </div>
      </div>
    </section>

    <aside class="side-panel" aria-label="游戏状态">
      <div class="score-strip">
        <div class="stat">
          <div class="stat-label">分数</div>
          <div id="score" class="stat-value">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">最高分</div>
          <div id="bestScore" class="stat-value">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">速度</div>
          <div id="level" class="stat-value">1</div>
        </div>
        <div class="stat">
          <div class="stat-label">节拍</div>
          <div id="tick" class="stat-value">200</div>
        </div>
      </div>
      <div class="controls">
        <button id="pauseBtn" type="button">暂停</button>
        <button id="restartBtn" class="secondary" type="button">重新开始</button>
      </div>
      <div id="status" class="status">进行中</div>
      <section class="panel-block" aria-label="当前道具效果">
        <p class="panel-title">当前效果</p>
        <div class="effect-list">
          <div class="effect-row">
            <span class="effect-name"><span class="icon slow">S</span>慢速时钟</span>
            <span id="slowTime" class="effect-time">--</span>
          </div>
          <div class="effect-row">
            <span class="effect-name"><span class="icon double">x2</span>双倍分数</span>
            <span id="doubleTime" class="effect-time">--</span>
          </div>
          <div class="effect-row">
            <span class="effect-name"><span class="icon phase">P</span>相位穿行</span>
            <span id="phaseTime" class="effect-time">--</span>
          </div>
        </div>
      </section>
      <section class="panel-block" aria-label="道具图例">
        <p class="panel-title">道具</p>
        <div class="legend">
          <div class="legend-row"><span class="legend-name"><span class="icon gold">G</span>黄金食物</span>+30 分，蛇身 +2</div>
          <div class="legend-row"><span class="legend-name"><span class="icon slow">S</span>慢速时钟</span>8 秒降速</div>
          <div class="legend-row"><span class="legend-name"><span class="icon double">x2</span>双倍分数</span>10 秒倍率</div>
          <div class="legend-row"><span class="legend-name"><span class="icon phase">P</span>相位穿行</span>7 秒穿墙穿身</div>
        </div>
      </section>
      <section class="panel-block" aria-label="排行榜">
        <p class="panel-title">排行榜</p>
        <ol id="leaderboard" class="leaderboard"></ol>
      </section>
    </aside>
  </main>

  <script>
    (() => {
      const GRID_SIZE = 24;
      const INITIAL_TICK_MS = 200;
      const MIN_TICK_MS = 95;
      const SPEED_STEP_MS = 5;
      const SPEED_FOOD_STEP = 2;
      const SCORE_PER_FOOD = 10;
      const BEST_SCORE_KEY = "snake_game_best_score_v1";
      const LEADERBOARD_KEY = "snake_game_leaderboard_v1";
      const PLAYER_NAME_KEY = "snake_game_player_name_v1";
      const LEADERBOARD_LIMIT = 8;
      const POWERUP_LIFETIME_MS = 9000;
      const SLOW_DURATION_MS = 8000;
      const DOUBLE_DURATION_MS = 10000;
      const PHASE_DURATION_MS = 7000;

      const POWERUPS = {
        gold: { label: "黄金食物", mark: "G", color: "#e7a316", dark: "#9d6509", light: "#fff4b9" },
        slow: { label: "慢速时钟", mark: "S", color: "#2878d8", dark: "#124171", light: "#cbe5ff" },
        double: { label: "双倍分数", mark: "x2", color: "#8a57d6", dark: "#4e2984", light: "#eadcff" },
        phase: { label: "相位穿行", mark: "P", color: "#0d9aa6", dark: "#075960", light: "#c7f8fb" }
      };

      const canvas = document.getElementById("board");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const bestScoreEl = document.getElementById("bestScore");
      const levelEl = document.getElementById("level");
      const tickEl = document.getElementById("tick");
      const statusEl = document.getElementById("status");
      const slowTimeEl = document.getElementById("slowTime");
      const doubleTimeEl = document.getElementById("doubleTime");
      const phaseTimeEl = document.getElementById("phaseTime");
      const pauseBtn = document.getElementById("pauseBtn");
      const restartBtn = document.getElementById("restartBtn");
      const scoreForm = document.getElementById("scoreForm");
      const playerNameInput = document.getElementById("playerName");
      const leaderboardEl = document.getElementById("leaderboard");
      const overlay = document.getElementById("overlay");
      const overlayTitle = document.getElementById("overlayTitle");
      const overlayText = document.getElementById("overlayText");

      let boardSize = 0;
      let cellSize = 0;
      let lastFrameTime = 0;
      let accumulator = 0;
      let animationId = 0;
      let snake = [];
      let direction = { x: 1, y: 0 };
      let queuedDirection = { x: 1, y: 0 };
      let food = { x: 16, y: 12 };
      let powerup = null;
      let score = 0;
      let eaten = 0;
      let growthPending = 0;
      let paused = false;
      let gameOver = false;
      let scoreSaved = false;
      let lastMessage = "进行中";
      let effects = { slowUntil: 0, doubleUntil: 0, phaseUntil: 0 };
      let bestScore = readBestScore();
      let leaderboard = readLeaderboard();
      if (leaderboard.length > 0 && leaderboard[0].score > bestScore) {
        bestScore = leaderboard[0].score;
        writeBestScore(bestScore);
      }

      function readBestScore() {
        try {
          const value = Number.parseInt(localStorage.getItem(BEST_SCORE_KEY) || "0", 10);
          return Number.isFinite(value) ? value : 0;
        } catch {
          return 0;
        }
      }

      function writeBestScore(value) {
        try {
          localStorage.setItem(BEST_SCORE_KEY, String(value));
        } catch {
          // Ignore storage failures / 忽略存储失败
        }
      }

      function readLeaderboard() {
        try {
          const parsed = JSON.parse(localStorage.getItem(LEADERBOARD_KEY) || "[]");
          if (!Array.isArray(parsed)) {
            return [];
          }
          return parsed
            .filter((entry) => entry && typeof entry.name === "string" && Number.isFinite(entry.score))
            .sort((a, b) => b.score - a.score)
            .slice(0, LEADERBOARD_LIMIT);
        } catch {
          return [];
        }
      }

      function writeLeaderboard() {
        try {
          localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(leaderboard));
        } catch {
          // Ignore storage failures / 忽略存储失败
        }
      }

      function sanitizePlayerName(rawName) {
        const name = rawName.trim().replace(/\s+/g, " ").slice(0, 16);
        return name || "匿名玩家";
      }

      function lastPlayerName() {
        try {
          return localStorage.getItem(PLAYER_NAME_KEY) || "";
        } catch {
          return "";
        }
      }

      function rememberPlayerName(name) {
        try {
          localStorage.setItem(PLAYER_NAME_KEY, name);
        } catch {
          // Ignore storage failures / 忽略存储失败
        }
      }

      function renderLeaderboard() {
        leaderboardEl.innerHTML = "";
        if (leaderboard.length === 0) {
          const empty = document.createElement("li");
          empty.innerHTML = '<span class="rank">--</span><span class="player">暂无记录</span><span class="rank-score">0</span>';
          leaderboardEl.appendChild(empty);
          return;
        }
        leaderboard.forEach((entry, index) => {
          const item = document.createElement("li");
          const rank = document.createElement("span");
          const player = document.createElement("span");
          const rankScore = document.createElement("span");
          rank.className = "rank";
          player.className = "player";
          rankScore.className = "rank-score";
          rank.textContent = String(index + 1);
          player.textContent = entry.name;
          rankScore.textContent = String(entry.score);
          item.append(rank, player, rankScore);
          leaderboardEl.appendChild(item);
        });
      }

      function saveScore(name) {
        const cleanName = sanitizePlayerName(name);
        rememberPlayerName(cleanName);
        leaderboard.push({
          name: cleanName,
          score,
          level: speedLevel(),
          date: new Date().toISOString()
        });
        leaderboard.sort((a, b) => b.score - a.score);
        leaderboard = leaderboard.slice(0, LEADERBOARD_LIMIT);
        writeLeaderboard();
        scoreSaved = true;
        lastMessage = `已保存排名：${cleanName} ${score} 分`;
        renderLeaderboard();
        updateHud();
      }

      function nowMs() {
        return performance.now();
      }

      function isActive(effectName) {
        return effects[`${effectName}Until`] > nowMs();
      }

      function remainingSeconds(effectName) {
        const remaining = effects[`${effectName}Until`] - nowMs();
        return remaining > 0 ? Math.ceil(remaining / 1000) : 0;
      }

      function speedLevel() {
        return Math.floor(eaten / SPEED_FOOD_STEP) + 1;
      }

      function tickMs() {
        const baseTick = Math.max(MIN_TICK_MS, INITIAL_TICK_MS - (speedLevel() - 1) * SPEED_STEP_MS);
        return isActive("slow") ? baseTick + 45 : baseTick;
      }

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        boardSize = Math.max(240, Math.floor(Math.min(rect.width, rect.height)));
        cellSize = boardSize / GRID_SIZE;
        const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
        canvas.width = Math.round(boardSize * dpr);
        canvas.height = Math.round(boardSize * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        draw();
      }

      function resetGame() {
        const mid = Math.floor(GRID_SIZE / 2);
        snake = [
          { x: mid + 1, y: mid },
          { x: mid, y: mid },
          { x: mid - 1, y: mid }
        ];
        direction = { x: 1, y: 0 };
        queuedDirection = { x: 1, y: 0 };
        score = 0;
        eaten = 0;
        growthPending = 0;
        paused = false;
        gameOver = false;
        scoreSaved = false;
        powerup = null;
        effects = { slowUntil: 0, doubleUntil: 0, phaseUntil: 0 };
        lastMessage = "进行中";
        accumulator = 0;
        lastFrameTime = nowMs();
        food = placeItem([]);
        updateHud();
        draw();
        canvas.focus({ preventScroll: true });
      }

      function occupiedSet(extra = []) {
        const occupied = new Set(snake.map((part) => `${part.x},${part.y}`));
        extra.forEach((part) => occupied.add(`${part.x},${part.y}`));
        return occupied;
      }

      function placeItem(extra = []) {
        const occupied = occupiedSet(extra);
        const freeCells = [];
        for (let y = 0; y < GRID_SIZE; y += 1) {
          for (let x = 0; x < GRID_SIZE; x += 1) {
            if (!occupied.has(`${x},${y}`)) {
              freeCells.push({ x, y });
            }
          }
        }
        if (freeCells.length === 0) {
          return { x: -1, y: -1 };
        }
        return freeCells[Math.floor(Math.random() * freeCells.length)];
      }

      function maybeSpawnPowerup() {
        if (powerup || eaten === 0 || eaten % 3 !== 0) {
          return;
        }
        const types = Object.keys(POWERUPS);
        const type = types[Math.floor(Math.random() * types.length)];
        const position = placeItem([food]);
        powerup = {
          ...position,
          type,
          expiresAt: nowMs() + POWERUP_LIFETIME_MS
        };
      }

      function setDirection(next) {
        if (next.x + direction.x === 0 && next.y + direction.y === 0) {
          return;
        }
        queuedDirection = next;
      }

      function addScore(points) {
        const multiplier = isActive("double") ? 2 : 1;
        score += points * multiplier;
        if (score > bestScore) {
          bestScore = score;
          writeBestScore(bestScore);
        }
      }

      function normalizeHead(head) {
        if (!isActive("phase")) {
          return head;
        }
        return {
          x: (head.x + GRID_SIZE) % GRID_SIZE,
          y: (head.y + GRID_SIZE) % GRID_SIZE
        };
      }

      function applyPowerup(type) {
        if (type === "gold") {
          addScore(30);
          growthPending += 2;
          lastMessage = "黄金食物：+30 分，蛇身 +2";
          return;
        }
        if (type === "slow") {
          effects.slowUntil = nowMs() + SLOW_DURATION_MS;
          lastMessage = "慢速时钟：8 秒降速";
          return;
        }
        if (type === "double") {
          effects.doubleUntil = nowMs() + DOUBLE_DURATION_MS;
          lastMessage = "双倍分数：10 秒倍率";
          return;
        }
        if (type === "phase") {
          effects.phaseUntil = nowMs() + PHASE_DURATION_MS;
          lastMessage = "相位穿行：7 秒穿墙穿身";
        }
      }

      function step() {
        if (powerup && powerup.expiresAt <= nowMs()) {
          powerup = null;
        }

        direction = queuedDirection;
        const head = snake[0];
        let nextHead = { x: head.x + direction.x, y: head.y + direction.y };
        const phaseActive = isActive("phase");
        const hitsWall = nextHead.x < 0 || nextHead.x >= GRID_SIZE || nextHead.y < 0 || nextHead.y >= GRID_SIZE;

        if (hitsWall && !phaseActive) {
          finishGame();
          return;
        }
        nextHead = normalizeHead(nextHead);

        const eatsFood = nextHead.x === food.x && nextHead.y === food.y;
        const eatsPowerup = powerup && nextHead.x === powerup.x && nextHead.y === powerup.y;
        const growsThisStep = growthPending > 0 || eatsFood || (eatsPowerup && powerup.type === "gold");
        const bodyLimit = growsThisStep ? snake.length : snake.length - 1;

        if (!phaseActive) {
          for (let i = 0; i < bodyLimit; i += 1) {
            if (snake[i].x === nextHead.x && snake[i].y === nextHead.y) {
              finishGame();
              return;
            }
          }
        }

        snake.unshift(nextHead);

        if (eatsFood) {
          addScore(SCORE_PER_FOOD);
          eaten += 1;
          growthPending += 1;
          lastMessage = isActive("double") ? "普通食物：+20 分" : "普通食物：+10 分";
          food = placeItem(powerup ? [powerup] : []);
          maybeSpawnPowerup();
        }

        if (eatsPowerup) {
          applyPowerup(powerup.type);
          powerup = null;
        }

        if (growthPending > 0) {
          growthPending -= 1;
        } else {
          snake.pop();
        }

        updateHud();
      }

      function finishGame() {
        gameOver = true;
        paused = false;
        lastMessage = "游戏结束";
        updateHud();
        setTimeout(() => {
          if (gameOver && !scoreSaved) {
            playerNameInput.focus({ preventScroll: true });
            playerNameInput.select();
          }
        }, 0);
      }

      function togglePause(forcePause) {
        if (gameOver) {
          return;
        }
        paused = typeof forcePause === "boolean" ? forcePause : !paused;
        accumulator = 0;
        lastFrameTime = nowMs();
        updateHud();
      }

      function updateEffectTime(element, effectName) {
        const seconds = remainingSeconds(effectName);
        element.textContent = seconds > 0 ? `${seconds}s` : "--";
      }

      function updateHud() {
        scoreEl.textContent = String(score);
        bestScoreEl.textContent = String(bestScore);
        levelEl.textContent = String(speedLevel());
        tickEl.textContent = String(tickMs());
        updateEffectTime(slowTimeEl, "slow");
        updateEffectTime(doubleTimeEl, "double");
        updateEffectTime(phaseTimeEl, "phase");

        pauseBtn.textContent = paused ? "继续" : "暂停";
        if (gameOver) {
          statusEl.textContent = "游戏结束";
          overlayTitle.textContent = "游戏结束";
          overlayText.textContent = scoreSaved ? "排名已保存，按重新开始再来一局" : "输入用户名保存本局分数";
          scoreForm.hidden = scoreSaved;
          if (!scoreSaved && document.activeElement !== playerNameInput) {
            playerNameInput.value = playerNameInput.value || lastPlayerName();
          }
          overlay.classList.add("visible");
          return;
        }
        scoreForm.hidden = true;
        if (paused) {
          statusEl.textContent = "已暂停";
          overlayTitle.textContent = "暂停";
          overlayText.textContent = "按继续返回游戏";
          overlay.classList.add("visible");
          return;
        }
        statusEl.textContent = lastMessage;
        overlay.classList.remove("visible");
      }

      function drawRoundCell(part, color, inset = 2, alpha = 1) {
        const x = part.x * cellSize + inset;
        const y = part.y * cellSize + inset;
        const size = cellSize - inset * 2;
        const radius = Math.max(3, cellSize * 0.20);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.roundRect(x, y, size, size, radius);
        ctx.fill();
        ctx.restore();
      }

      function drawSphere(part, config, label, inset = 3) {
        const x = part.x * cellSize + inset;
        const y = part.y * cellSize + inset;
        const size = cellSize - inset * 2;
        const centerX = x + size / 2;
        const centerY = y + size / 2;
        const radius = size / 2;
        const gradient = ctx.createRadialGradient(
          x + size * 0.30,
          y + size * 0.25,
          radius * 0.12,
          centerX,
          centerY,
          radius
        );
        gradient.addColorStop(0, config.light);
        gradient.addColorStop(0.34, config.color);
        gradient.addColorStop(1, config.dark);

        ctx.save();
        ctx.shadowColor = "rgba(24, 34, 53, 0.26)";
        ctx.shadowBlur = Math.max(4, cellSize * 0.18);
        ctx.shadowOffsetY = Math.max(1, cellSize * 0.10);
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowColor = "transparent";
        ctx.fillStyle = "rgba(255, 255, 255, 0.56)";
        ctx.beginPath();
        ctx.ellipse(x + size * 0.34, y + size * 0.28, radius * 0.28, radius * 0.18, -0.55, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#ffffff";
        ctx.font = `850 ${Math.max(9, cellSize * 0.34)}px Segoe UI, Arial, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(label, centerX, centerY + 0.5);
        ctx.restore();
      }

      function drawGrid() {
        ctx.fillStyle = "#fcfdff";
        ctx.fillRect(0, 0, boardSize, boardSize);
        ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--grid").trim();
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let i = 0; i <= GRID_SIZE; i += 1) {
          const pos = Math.round(i * cellSize) + 0.5;
          ctx.moveTo(pos, 0);
          ctx.lineTo(pos, boardSize);
          ctx.moveTo(0, pos);
          ctx.lineTo(boardSize, pos);
        }
        ctx.stroke();
      }

      function drawFood(part) {
        drawSphere(part, {
          light: "#ffd7d8",
          color: getComputedStyle(document.documentElement).getPropertyValue("--food").trim(),
          dark: "#992b31"
        }, "", 3);
      }

      function draw() {
        if (!ctx || boardSize === 0) {
          return;
        }
        drawGrid();
        drawFood(food);
        if (powerup) {
          const config = POWERUPS[powerup.type];
          drawSphere(powerup, config, config.mark, 3);
        }
        snake.forEach((part, index) => {
          const color = index === 0
            ? getComputedStyle(document.documentElement).getPropertyValue("--snake-head").trim()
            : getComputedStyle(document.documentElement).getPropertyValue("--snake").trim();
          drawRoundCell(part, color, index === 0 ? 1.5 : 2.5, isActive("phase") ? 0.72 : 1);
        });
      }

      function frame(now) {
        const delta = Math.min(100, now - lastFrameTime);
        lastFrameTime = now;

        if (!paused && !gameOver) {
          accumulator += delta;
          while (accumulator >= tickMs()) {
            step();
            accumulator -= tickMs();
            if (gameOver) {
              break;
            }
          }
          updateHud();
        }

        draw();
        animationId = requestAnimationFrame(frame);
      }

      function handleKeydown(event) {
        if (event.target instanceof HTMLInputElement) {
          return;
        }
        const keys = new Map([
          ["ArrowUp", { x: 0, y: -1 }],
          ["w", { x: 0, y: -1 }],
          ["W", { x: 0, y: -1 }],
          ["ArrowDown", { x: 0, y: 1 }],
          ["s", { x: 0, y: 1 }],
          ["S", { x: 0, y: 1 }],
          ["ArrowLeft", { x: -1, y: 0 }],
          ["a", { x: -1, y: 0 }],
          ["A", { x: -1, y: 0 }],
          ["ArrowRight", { x: 1, y: 0 }],
          ["d", { x: 1, y: 0 }],
          ["D", { x: 1, y: 0 }]
        ]);

        if (keys.has(event.key)) {
          event.preventDefault();
          setDirection(keys.get(event.key));
          return;
        }
        if (event.key === " ") {
          event.preventDefault();
          togglePause();
          return;
        }
        if (event.key === "Enter") {
          event.preventDefault();
          resetGame();
        }
      }

      pauseBtn.addEventListener("click", () => {
        togglePause();
        canvas.focus({ preventScroll: true });
      });

      restartBtn.addEventListener("click", resetGame);

      scoreForm.addEventListener("submit", (event) => {
        event.preventDefault();
        if (!gameOver || scoreSaved) {
          return;
        }
        saveScore(playerNameInput.value);
      });

      window.addEventListener("keydown", handleKeydown);
      window.addEventListener("resize", resizeCanvas);
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          togglePause(true);
        }
      });

      bestScoreEl.textContent = String(bestScore);
      renderLeaderboard();
      resizeCanvas();
      resetGame();
      animationId = requestAnimationFrame(frame);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationId));
    })();
  </script>
</body>
</html>
